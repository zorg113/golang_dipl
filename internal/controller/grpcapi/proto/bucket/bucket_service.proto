syntax = "proto3";
package bucket;
option go_package = "github.com/zorg113/golang_dipl/atibruteforce/internal/controller/grpcapi/bucketpb";

import "common/common.proto";

message ResetBucketRequest  { common.Request request = 1; }
message ResetBucketResponse {
  bool reset_login = 1; // ← было resetLogin
  bool reset_ip    = 2; // ← было resetIp
}

service Bucket {
  rpc ResetBucket(ResetBucketRequest) returns (ResetBucketResponse);
}