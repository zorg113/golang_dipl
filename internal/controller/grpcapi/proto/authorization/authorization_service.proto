syntax = "proto3";
package authorization;
option go_package = "github.com/zorg113/golang_dipl/atibruteforce/internal/controller/grpcapi/authorizationpb";

import "common/common.proto";

message AuthorizationRequest  { common.Request request = 1; }
message AuthorizationResponse { bool is_allow = 1; }

service Authorization {
  rpc TryAuthorization(AuthorizationRequest) returns (AuthorizationResponse);
}